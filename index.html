                                <div className="sm:col-span-2">
                                    <span className="text-gray-400 text-xs block mb-1">匯款資訊</span> 
                                    <div className="p-3 bg-blue-50 rounded-lg text-blue-900 font-bold border border-blue-100">
                                        {formData.bankType === 'bank' ? `銀行：${formData.bankName} / 帳號：${formData.bankAccount}` : 
                                         formData.bankType === 'post' ? `郵局：局號 ${formData.postOffice} / 帳號 ${formData.postAccount}` : '方式：親自領取'}
                                    </div>
                                </div>
                            </div>
                            {passbookUrl && (
                                <div className="mt-8 border-t pt-6">
                                    <span className="text-gray-400 text-xs block mb-3">存摺封面：</span>
                                    <img src={passbookUrl} alt="存摺封面" className="max-h-56 rounded-xl border border-gray-200 shadow-sm" />
                                </div>
                            )}
                            <div className="mt-8 border-t pt-6 text-center">
                                    <span className="text-gray-400 text-xs block mb-3">具領人簽章：</span>
                                <div className="p-4 bg-gray-50 rounded-xl inline-block border-2 border-dashed border-gray-200">
                                    <img src={signatureUrl} alt="簽名" className="max-h-24" />
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex flex-col gap-4">
                            <button onClick={() => setStep('form')} className="w-full py-4 bg-gray-500 text-white font-bold rounded-2xl hover:bg-gray-600 transition-shadow shadow-md">✏️ 返回修改</button>
                            <button onClick={processAutoEncryptSubmit} disabled={isSubmitting || !authConfig.publicKey} className={`w-full py-4 font-bold rounded-2xl text-white shadow-lg transition-all text-xl ${isSubmitting || !authConfig.publicKey ? 'bg-gray-300' : 'bg-green-600 hover:bg-green-700'}`}>
                                {isSubmitting ? '加密上傳中...' : '🚀 確認無誤，線上自動送出'}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto my-10 p-8 bg-white rounded-3xl shadow-xl border border-gray-50 print-hide">
                    <button onClick={() => setView('home')} className="mb-6 text-blue-600 flex items-center hover:underline">← 返回首頁</button>
                    <div className="mb-8">
                        <p className="text-blue-500 text-xs font-bold uppercase tracking-widest mb-1">{sysConfig.schoolName} {sysConfig.deptName}</p>
                        <h2 className="text-2xl font-bold text-green-800 border-l-8 border-green-500 pl-4 flex items-center gap-2">
                            講師領據資料填寫 
                        </h2>
                    </div>
                    
                    {authConfig.publicKey ? (
                        <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl text-green-800 text-sm flex items-center gap-3">
                            <span className="text-2xl">🛡️</span>
                            <p>本系統已啟動端到端非對稱加密。**您的資料將在送出時被全自動高強度加密**，保障個資安全，您講師只需專心填寫即可。</p>
                        </div>
                    ) : (
                        <div className="mb-6 p-4 bg-orange-50 border border-orange-200 rounded-xl text-orange-800 text-sm flex items-center gap-3">
                            <span className="text-2xl">⚠️</span>
                            <p>系統安全警告：尚未設定公鑰憑證。講師將無法安全加密送出資料。</p>
                        </div>
                    )}

                    <form onSubmit={handlePreviewClick} className="space-y-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">講師姓名 <span className="text-red-500">*</span></label><input required type="text" className="w-full p-3 border rounded-xl shadow-inner bg-gray-50 focus:bg-white transition-all" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1">身分證字號 <span className="text-red-500">*</span></label><input required type="text" className="w-full p-3 border rounded-xl shadow-inner bg-gray-50 focus:bg-white transition-all" placeholder="身分證核銷用" value={formData.idNumber} onChange={e => setFormData({...formData, idNumber: e.target.value})} /></div>
                        </div>
                        <div><label className="block text-sm font-bold text-gray-700 mb-1">戶籍地址 <span className="text-red-500">*</span></label><input required type="text" className="w-full p-3 border rounded-xl shadow-inner bg-gray-50 focus:bg-white transition-all" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} /></div>
                        <div><label className="block text-sm font-bold text-gray-700 mb-1">聯絡電話 <span className="text-red-500">*</span></label><input required type="text" className="w-full p-3 border rounded-xl shadow-inner bg-gray-50 focus:bg-white transition-all" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} /></div>

                        <div className="border-2 border-blue-50 p-6 rounded-2xl bg-blue-50/30">
                            <label className="block text-base font-bold text-blue-900 mb-4 flex items-center gap-2">🏦 匯款帳號資訊 <span className="text-red-500">*</span></label>
                            <div className="space-y-4">
                                <div className="flex gap-6">
                                    <label className="flex items-center space-x-2 cursor-pointer"><input type="radio" value="bank" checked={formData.bankType === 'bank'} onChange={e => setFormData({...formData, bankType: e.target.value})} className="w-4 h-4" /> <span className="font-medium">一般銀行</span></label>
                                    <label className="flex items-center space-x-2 cursor-pointer"><input type="radio" value="post" checked={formData.bankType === 'post'} onChange={e => setFormData({...formData, bankType: e.target.value})} className="w-4 h-4" /> <span className="font-medium">中華郵政</span></label>
                                    <label className="flex items-center space-x-2 cursor-pointer"><input type="radio" value="other" checked={formData.bankType === 'other'} onChange={e => setFormData({...formData, bankType: e.target.value})} className="w-4 h-4" /> <span className="font-medium">親自領取</span></label>
                                </div>
                                {formData.bankType === 'bank' && <div className="grid grid-cols-2 gap-2 animate-in fade-in slide-in-from-top-1"><input required type="text" placeholder="銀行名" className="p-3 border rounded-xl bg-white" value={formData.bankName} onChange={e => setFormData({...formData, bankName: e.target.value})}/><input required type="text" placeholder="完整帳號" className="p-3 border rounded-xl bg-white" value={formData.bankAccount} onChange={e => setFormData({...formData, bankAccount: e.target.value})}/></div>}
                                {formData.bankType === 'post' && <div className="grid grid-cols-2 gap-2 animate-in fade-in slide-in-from-top-1"><input required type="text" placeholder="局號 (7碼)" className="p-3 border rounded-xl bg-white" value={formData.postOffice} onChange={e => setFormData({...formData, postOffice: e.target.value})}/><input required type="text" placeholder="帳號 (7碼)" className="p-3 border rounded-xl bg-white" value={formData.postAccount} onChange={e => setFormData({...formData, postAccount: e.target.value})}/></div>}
                            </div>
                            {(formData.bankType === 'bank' || formData.bankType === 'post') && (
                                <div className="mt-6 pt-4 border-t border-blue-100">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">上傳存摺封面照片 <span className="text-red-500">*</span></label>
                                    <input required type="file" accept="image/jpeg, image/png" onChange={handlePhotoUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition-colors"/>
                                    {passbookUrl && <img src={passbookUrl} alt="存摺預覽" className="mt-3 h-24 object-contain rounded-lg border shadow-sm" />}
                                </div>
                            )}
                        </div>

                        <div className="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center bg-gray-50">
                            <label className="block text-sm font-bold text-gray-700 mb-4">具領人電子簽章 <span className="text-red-500">*</span></label>
                            {signatureUrl ? (
                                <div className="flex flex-col items-center">
                                    <img src={signatureUrl} alt="已簽名" className="h-32 object-contain bg-white border rounded-xl mb-4 shadow-sm" />
                                    <button type="button" onClick={() => setIsSignModalOpen(true)} className="text-sm text-blue-600 underline">重新簽名</button>
                                </div>
                            ) : (
                                <button type="button" onClick={() => setIsSignModalOpen(true)} className="w-full py-10 border-2 border-blue-200 text-blue-600 rounded-2xl bg-white hover:bg-blue-50 font-bold transition-all shadow-sm">✍️ 啟動簽名板</button>
                            )}
                        </div>

                        <div className="p-5 bg-orange-50 rounded-2xl border border-orange-100 text-xs space-y-2">
                            <p className="font-bold text-orange-800 text-sm mb-1">【個人資料蒐集與安全加密聲明】</p>
                            <p>1. 本系統由 {sysConfig.schoolName} {sysConfig.deptName} 管理。</p>
                            <p>2. 您的所有資料將在送出前於您的裝置進行 AES-256 高強度加密，資料庫中僅會儲存亂碼，請安心填寫。</p>
                            <label className="flex items-center space-x-2 mt-4 cursor-pointer">
                                <input type="checkbox" required className="w-5 h-5 accent-green-600" checked={isAgreed} onChange={e => setIsAgreed(e.target.checked)} />
                                <span className="text-orange-900 font-bold text-sm underline underline-offset-4">我已閱讀並同意上述聲明</span>
                            </label>
                        </div>

                        <button type="submit" disabled={!isAgreed} className={`w-full py-5 rounded-2xl text-white font-bold text-xl shadow-xl transition-all transform active:scale-95 ${isAgreed ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 cursor-not-allowed'}`}>
                            資料預覽與確認送出 👉
                        </button>
                    </form>

                    {isSignModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex flex-col justify-center items-center p-4">
                            <div className="bg-white w-full max-w-lg p-6 rounded-3xl flex flex-col h-[70vh] shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 text-center text-gray-800 shrink-0">手寫簽名區域</h3>
                                <div className="border-4 border-gray-100 flex-1 relative bg-white overflow-hidden rounded-2xl">
                                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full cursor-crosshair" style={{ touchAction: 'none' }} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}></canvas>
                                </div>
                                <div className="flex gap-4 mt-6 shrink-0">
                                    <button onClick={clearSignature} className="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl font-bold text-lg border border-red-100">清除</button>
                                    <button onClick={confirmSignature} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">完成簽名</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AdminView(props) {
            const { setView, config, setConfig, saveConfig, instructorsRaw, setSelectedInstructors, showToast, itemOptions, today, sysConfig, setSysConfig, authConfig, adminLoginPwd, setAdminLoginPwd, adminKey, setAdminKey, setIsAdminAuthenticated, user, auth } = props;
            
            const [searchTerm, setSearchTerm] = useState('');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isClearModalOpen, setIsClearModalOpen] = useState(false);
            const [addFormData, setAddFormData] = useState({ name: '', idNumber: '', address: '', bankType: 'bank', bankName: '', bankBranch: '', bankAccount: '', postOffice: '', postAccount: '', phone: '' });
            
            // 圖檔預覽的縮放與平移狀態
            const [previewImageUrl, setPreviewImageUrl] = useState(null);
            const [imageScalePercent, setImageScalePercent] = useState(100);
            const [imageOffsetX, setImageOffsetX] = useState(0);
            const [imageOffsetY, setImageOffsetY] = useState(0);

            const [isChangeE2eeModalOpen, setIsChangeE2eeModalOpen] = useState(false);
            const [e2eeFormData, setE2eeFormData] = useState({ oldKey: '', newKey: '', confirmKey: '' });
            const [showOldKey, setShowOldKey] = useState(false);
            const [showNewKey, setShowNewKey] = useState(false);
            const [showConfirmKey, setShowConfirmKey] = useState(false);

            const [isGenerating, setIsGenerating] = useState(false);
            const [selectedIds, setSelectedIds] = useState(new Set());
            
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const decryptedInstructors = useMemo(() => {
                if (!adminKey) return [];
                return instructorsRaw.map(inst => {
                    if (inst.payload && inst.e2eeKey) {
                        const decryptor = new window.JSEncrypt();
                        decryptor.setPrivateKey(adminKey);
                        const sessionKey = decryptor.decrypt(inst.e2eeKey);
                        if (!sessionKey) return { ...inst, decryptionFailed: true };

                        try {
                            const bytes = window.CryptoJS.AES.decrypt(inst.payload, sessionKey);
                            const decryptedStr = bytes.toString(window.CryptoJS.enc.Utf8);
                            if (!decryptedStr) throw new Error();
                            const data = JSON.parse(decryptedStr);
                            return { id: inst.id, createdAt: inst.createdAt, name: inst.name, ...data };
                        } catch(e) {
                            return { ...inst, decryptionFailed: true };
                        }
                    } 
                    else if (inst.payload) {
                        const decryptedData = decryptPayload(inst.payload, adminKey);
                        if (!decryptedData) return { ...inst, decryptionFailed: true };
                        return { id: inst.id, createdAt: inst.createdAt, name: inst.name, ...decryptedData };
                    } 
                    else {
                        return inst;
                    }
                });
            }, [instructorsRaw, adminKey]);

            const filteredInstructors = useMemo(() => {
                return decryptedInstructors.filter(i => 
                    i.name?.includes(searchTerm) || 
                    (i.idNumber && i.idNumber.includes(searchTerm))
                );
            }, [decryptedInstructors, searchTerm]);

            if (!authConfig.publicKey) {
                const handleGenerateRSA = () => {
                    setIsGenerating(true);
                    setTimeout(async () => {
                        try {
                            const crypt = new window.JSEncrypt({default_key_size: 2048});
                            crypt.getKey();
                            const pubKey = crypt.getPublicKey();
                            const privKey = crypt.getPrivateKey();

                            const encPrivKey = window.CryptoJS.AES.encrypt(privKey, adminLoginPwd).toString();

                            await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), { 
                                publicKey: pubKey,
                                encryptedPrivateKey: encPrivKey
                            }, { merge: true });

                            setAdminKey(privKey);
                            showToast('✅ 系統安全金鑰 (RSA) 設定完成！講師已可安全填寫。');
                        } catch(err) { 
                            showToast('憑證產生失敗。'); 
                        } finally {
                            setIsGenerating(false);
                        }
                    }, 100);
                };

                return (
                    <div className="max-w-3xl mx-auto my-10 p-8 bg-white rounded-3xl shadow-xl border-t-8 border-indigo-600 animate-in zoom-in-95 relative overflow-hidden print-hide">
                        {isGenerating && (
                            <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                                <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="font-bold text-indigo-900">正在產生高強度非對稱金鑰對...</p>
                                <p className="text-xs text-gray-500 mt-2">請稍候，這可能需要幾秒鐘</p>
                            </div>
                        )}
                        <h2 className="text-3xl font-bold mb-4 text-indigo-900">🛡️ 步驟二：設定公鑰憑證 (E2EE)</h2>
                        <p className="text-gray-600 mb-6 bg-indigo-50 p-4 rounded-xl text-lg leading-relaxed">
                            您已成功設定管理者密碼並登入後台。<br/><br/>
                            為了啟用「端到端高等級加密」，請點擊下方按鈕，系統將為您自動生成一組專屬的 RSA 金鑰對。<br/>
                            <span className="text-sm text-indigo-600 font-bold">這將確保所有講師只需使用一般首頁網址，即可在全自動加密的狀態下安全送出個資。</span>
                        </p>
                        <div className="text-center mt-8">
                            <button onClick={handleGenerateRSA} className="w-full sm:w-auto px-10 py-5 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-xl transition-all transform active:scale-95 text-xl">
                                🚀 立即產生並啟用公鑰憑證
                            </button>
                        </div>
                    </div>
                );
            }

            const handleImportExcel = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (!window.XLSX) {
                    showToast('❌ Excel 套件尚未載入，請稍候再試。');
                    e.target.value = '';
                    return;
                }

                if (!user || !authConfig.publicKey || !adminKey) {
                    showToast('❌ 請先完成系統連線與安全初始化！'); 
                    e.target.value = '';
                    return;
                }

                showToast('檔案解析中...');
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const dataBuffer = evt.target.result;
                        const wb = window.XLSX.read(dataBuffer, { type: 'array' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = window.XLSX.utils.sheet_to_json(ws);

                        let count = 0;
                        for (let row of data) {
                            const name = String(row['姓名'] || row['Name'] || row['name'] || '').trim();
                            if (!name || name.includes('(必填)')) continue; 
                            
                            const idNumber = String(row['身分證'] || row['身分證字號'] || '').trim();
                            const address = String(row['地址'] || row['戶籍地址'] || '').trim();
                            const phone = String(row['電話'] || row['聯絡電話'] || '').trim();
                            const bankRaw = String(row['銀行'] || row['銀行名稱'] || '').trim();
                            const accRaw = String(row['帳號'] || row['銀行帳號'] || '').trim();
                            
                            let bankType = 'other', bankName = '', bankAccount = '', postOffice = '', postAccount = '';
                            if (bankRaw.includes('郵局')) { bankType = 'post'; postAccount = accRaw; } 
                            else if (bankRaw) { bankType = 'bank'; bankName = bankRaw; bankAccount = accRaw; }

                            const newInst = { name, idNumber, address, phone, bankType, bankName, bankAccount, postOffice, postAccount, signatureUrl: null, passbookUrl: null };
                            
                            const sessionKey = generateRandomKey();
                            const encryptedPayload = window.CryptoJS.AES.encrypt(JSON.stringify(newInst), sessionKey).toString();
                            const encryptor = new window.JSEncrypt();
                            encryptor.setPublicKey(authConfig.publicKey);
                            const encryptedSessionKey = encryptor.encrypt(sessionKey);

                            const docId = `${user.uid}_import_${Date.now()}_${count}`;
                            await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors', docId), { 
                                name, payload: encryptedPayload, e2eeKey: encryptedSessionKey, createdAt: Date.now(), userId: user.uid 
                            });
                            count++;
                        }
                        
                        if (count > 0) showToast(`✅ 成功匯入 ${count} 筆講師資料並完成自動加密！`);
                        else showToast('⚠️ 未匯入任何資料，請確認工作表內容是否符合範本格式。');
                    } catch (err) {
                        console.error("Excel import error:", err);
                        showToast('❌ 匯入失敗，請確認檔案格式是否正確。');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            const handleDownloadTemplate = () => {
                if (!window.XLSX || !window.saveAs) { showToast("套件載入中..."); return; }
                try {
                    const templateData = [{
                        '姓名': '王大明 (必填)',
                        '身分證': 'A123456789',
                        '地址': '基隆市安樂區...',
                        '電話': '0912-345-678',
                        '銀行': '台灣銀行 (郵局請直接填寫郵局)',
                        '帳號': '123456789012'
                    }];
                    const sheet = window.XLSX.utils.json_to_sheet(templateData);
                    sheet['!cols'] = [{wch: 15}, {wch: 15}, {wch: 30}, {wch: 15}, {wch: 25}, {wch: 20}];

                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, sheet, "匯入範本");
                    
                    const excelBuffer = window.XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const data = new Blob([excelBuffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
                    window.saveAs(data, '講師資料匯入範本.xlsx');
                    showToast('✅ 範本下載成功！請依照格式填寫後匯入。');
                } catch (e) { showToast('❌ 範本下載失敗'); }
            };

            const handleQuickUpload = async (instructorId, field, e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.type !== 'image/jpeg' && file.type !== 'image/png') {
                    showToast('❌ 僅支援 JPG 或 PNG 格式的圖片');
                    e.target.value = '';
                    return;
                }

                if (!user || !authConfig.publicKey || !adminKey) { showToast('❌ 請先完成系統連線與安全初始化！'); return; }

                try {
                    showToast('圖檔處理與加密上傳中...');
                    const compressed = await compressImage(file, 600);
                    const instIndex = decryptedInstructors.findIndex(i => i.id === instructorId);
                    if (instIndex === -1 || decryptedInstructors[instIndex].decryptionFailed) {
                        showToast('無法取得該講師的解密資料，無法直接附加圖片。');
                        return;
                    }
                    
                    const fullData = { ...decryptedInstructors[instIndex], [field]: compressed };
                    delete fullData.id; delete fullData.createdAt; delete fullData.payload; delete fullData.e2eeKey; delete fullData.decryptionFailed;
                    
                    const sessionKey = generateRandomKey();
                    const newEncryptedPayload = window.CryptoJS.AES.encrypt(JSON.stringify(fullData), sessionKey).toString();
                    
                    const encryptor = new window.JSEncrypt();
                    encryptor.setPublicKey(authConfig.publicKey);
                    const newEncryptedSessionKey = encryptor.encrypt(sessionKey);

                    const docRef = doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors', instructorId);
                    await setDoc(docRef, { payload: newEncryptedPayload, e2eeKey: newEncryptedSessionKey }, { merge: true });
                    showToast('✅ 檔案已成功加密並更新！');
                } catch (err) { showToast('上傳失敗，請稍後再試。'); }
                e.target.value = '';
            };

            // 核心 PDF 生成引擎：建立隱藏離線畫布確保絕對不跑版
            const createImagePDF = async () => {
                if (!window.jspdf || !window.html2canvas) {
                    showToast('PDF 引擎載入中，請稍候再試...');
                    return null;
                }
                
                const tempContainer = document.createElement('div');
                tempContainer.style.position = 'absolute';
                tempContainer.style.top = '-9999px';
                tempContainer.style.left = '0';
                tempContainer.style.width = '210mm';
                tempContainer.style.height = '297mm';
                tempContainer.style.background = 'white';
                
                const originalElement = document.getElementById('image-print-root');
                const clonedNode = originalElement.cloneNode(true);
                
                clonedNode.style.width = '100%';
                clonedNode.style.height = '100%';
                clonedNode.style.minWidth = '100%';
                clonedNode.style.minHeight = '100%';
                clonedNode.style.boxShadow = 'none'; // 去除陰影
                
                tempContainer.appendChild(clonedNode);
                document.body.appendChild(tempContainer);

                const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

                try {
                    const canvas = await window.html2canvas(tempContainer, { 
                        scale: 2, 
                        useCORS: true, 
                        logging: false, 
                        backgroundColor: '#ffffff'
                    });
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    return pdf;
                } catch (error) {
                    console.error(error);
                    showToast('❌ PDF 產生失敗，請稍後再試。');
                    return null;
                } finally {
                    if (document.body.contains(tempContainer)) {
                        document.body.removeChild(tempContainer);
                    }
                }
            };

            // 瀏覽器原生列印：直接產生不跑版的 PDF 並在新分頁彈出觸發列印
            const handleNativeImagePrint = async () => {
                showToast('📄 產生高畫質列印檔中，請稍候...');
                const pdf = await createImagePDF();
                if (pdf) {
                    // 讓 PDF 開啟時自動呼叫列印對話框
                    pdf.autoPrint({variant: 'non-conform'});
                    const blob = pdf.output('blob');
                    const blobUrl = URL.createObjectURL(blob);
                    const win = window.open(blobUrl);
                    if (!win) {
                        showToast('⚠️ 瀏覽器阻擋了彈出視窗，改為直接下載，請開啟檔案後手動列印。');
                        pdf.save(`圖檔附件_列印檔.pdf`);
                    }
                }
            };

            // 匯出 PDF
            const handleGenerateImagePDF = async () => {
                showToast('📄 圖片 PDF 產生中，請稍候...');
                const pdf = await createImagePDF();
                if (pdf) {
                    pdf.save(`圖檔附件_${new Date().toISOString().split('T')[0]}.pdf`);
                    showToast('✅ 圖片 PDF 已成功下載！');
                }
            };

            const handleLogout = async () => {
                try {
                    await signOut(auth); // 🔥 連同 Firebase Google 帳號一起登出
                } catch(e) {}
                setAdminLoginPwd(null);
                setAdminKey(null); // 記憶體立即銷毀
                props.setIsAdminAuthenticated(false);
                setView('home');
                showToast('👋 已安全登出系統並銷毀記憶體金鑰');
            };

            const handleClearAllData = async () => {
                if (!user) return;
                try {
                    const deletePromises = instructorsRaw.map(inst =>
                        deleteDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors', inst.id))
                    );
                    await Promise.all(deletePromises);
                    showToast('✅ 所有講師資料已成功清空。');
                    setIsClearModalOpen(false);
                    setSelectedIds(new Set()); 
                } catch (error) { showToast('清空資料失敗。'); }
            };

            const handleConfirmSingleDelete = async () => {
                if (!user || !deleteConfirmId) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors', deleteConfirmId));
                    showToast('✅ 該筆講師資料已刪除。');
                    
                    if (selectedIds.has(deleteConfirmId)) {
                        const newSet = new Set(selectedIds);
                        newSet.delete(deleteConfirmId);
                        setSelectedIds(newSet);
                    }
                } catch (error) { showToast('刪除失敗。'); }
                setDeleteConfirmId(null);
            };

            const handleAdminAddSubmit = async (e) => {
                e.preventDefault();
                if (!user || !authConfig.publicKey || !adminKey) { showToast('❌ 請先連線並設定專案金鑰，系統才能進行加密儲存！'); return; }

                try {
                    const sessionKey = generateRandomKey();
                    const encryptedPayload = window.CryptoJS.AES.encrypt(JSON.stringify(addFormData), sessionKey).toString();
                    
                    const encryptor = new window.JSEncrypt();
                    encryptor.setPublicKey(authConfig.publicKey);
                    const encryptedSessionKey = encryptor.encrypt(sessionKey);

                    await addDoc(collection(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors'), { 
                        name: addFormData.name,
                        payload: encryptedPayload, 
                        e2eeKey: encryptedSessionKey,
                        createdAt: Date.now(),
                        userId: user.uid
                    });
                    showToast('✅ 資料已建檔加密');
                    setIsAddModalOpen(false);
                    setAddFormData({ name: '', idNumber: '', address: '', bankType: 'bank', bankName: '', bankBranch: '', bankAccount: '', postOffice: '', postAccount: '', phone: '' });
                } catch (error) { showToast('失敗'); }
            };

            const handleUpdateSysConfig = async () => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'system');
                    await setDoc(docRef, sysConfig);
                    showToast('✅ 系統名稱已成功更新！');
                } catch (e) { showToast('系統設定存檔失敗'); }
            };

            const handleToggleAllowSkip = async (checked) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), {
                        allowSkipPwd: checked
                    }, { merge: true });
                    showToast(checked ? '✅ 已開啟「稍後設定」選項' : '🔒 已關閉「稍後設定」選項');
                } catch (err) { showToast('設定失敗'); }
            };

            const handleUpdateE2eeKey = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                if (e2eeFormData.oldKey !== adminLoginPwd) { showToast('❌ 舊密碼錯誤！'); return; }
                if (e2eeFormData.newKey !== e2eeFormData.confirmKey) { showToast('❌ 兩次輸入的新密碼不一致！'); return; }
                if (!validatePassword(e2eeFormData.newKey)) { showToast("❌ 密碼強度不足！需包含英文、數字且長度 >= 6。"); return; }

                try {
                    showToast('正在重新設定保護鎖，請稍候...');
                    const newEncPrivKey = window.CryptoJS.AES.encrypt(adminKey, e2eeFormData.newKey).toString();
                    const newToken = encryptPayload('master-check', e2eeFormData.newKey);

                    await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), { 
                        verifyToken: newToken,
                        encryptedPrivateKey: newEncPrivKey
                    }, { merge: true });

                    setAdminLoginPwd(e2eeFormData.newKey);
                    showToast('✅ 管理密碼已成功修改！(歷史資料無須重加密)');
                    setIsChangeE2eeModalOpen(false);
                    setE2eeFormData({ oldKey: '', newKey: '', confirmKey: '' });
                } catch (err) { showToast('修改失敗'); }
            };

            const addItem = () => setConfig({ ...config, items: [...(config.items || []), { itemName: '', itemDate: today, startTime: '', endTime: '', qty: 1, price: 1000, remark: '' }] });
            const removeItem = (idx) => setConfig({ ...config, items: config.items.filter((_, i) => i !== idx) });
            const updateItem = (idx, field, val) => {
                const newItems = [...config.items];
                newItems[idx][field] = val;
                setConfig({ ...config, items: newItems });
            };

            const grandTotal = config.items ? config.items.reduce((s, i) => s + (i.qty * i.price), 0) : 0;

            const handleBatchDownload = async () => {
                if (!window.JSZip || !window.XLSX || !window.saveAs) { showToast("套件載入中..."); return; }
                const validData = decryptedInstructors.filter(i => !i.decryptionFailed);
                if (validData.length === 0) { showToast("沒有成功解密的講師資料可供匯出。"); return; }
                
                try {
                    const zip = new window.JSZip();
                    const sheetData = validData.map(i => ({
                        '建檔時間': new Date(i.createdAt).toLocaleString(),
                        '姓名': i.name,
                        '身分證': i.idNumber || '',
                        '地址': i.address || '',
                        '電話': i.phone || '',
                        '帳戶資訊': i.bankType === 'bank' ? `${i.bankName} ${i.bankAccount}` : (i.bankType === 'post' ? `郵局 ${i.postOffice}-${i.postAccount}` : '領現')
                    }));
                    const sheet = window.XLSX.utils.json_to_sheet(sheetData);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, sheet, "解密講師名冊");
                    zip.file("講師清單_解密版.xlsx", window.XLSX.write(wb, { type: 'array', bookType: 'xlsx' }));
                    
                    const sigFolder = zip.folder("電子簽名");
                    const passFolder = zip.folder("存摺封面");
                    validData.forEach(i => {
                        if (i.signatureUrl) sigFolder.file(`${i.name}_簽名.png`, i.signatureUrl.split(',')[1], { base64: true });
                        if (i.passbookUrl) passFolder.file(`${i.name}_存摺.jpg`, i.passbookUrl.split(',')[1], { base64: true });
                    });

                    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                    const content = await zip.generateAsync({ type: "blob" });
                    window.saveAs(content, `核銷解密資料_${sysConfig.deptName}_${dateStr}.zip`);
                    showToast('✅ 安全解密批次下載成功');
                } catch (e) { showToast('匯出失敗'); }
            };

            const handleSelectInstructor = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const handleSelectAll = () => {
                const validIds = filteredInstructors.filter(i => !i.decryptionFailed).map(i => i.id);
                if (selectedIds.size === validIds.length && validIds.length > 0) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(validIds));
                }
            };

            const handleBatchPrint = () => {
                const selectedList = filteredInstructors.filter(i => selectedIds.has(i.id));
                if (selectedList.length === 0) {
                    showToast('❌ 請先在列表中勾選至少一位講師！');
                    return;
                }
                setSelectedInstructors(selectedList);
                setView('receipt');
            };

            const handleSinglePrint = (instructor) => {
                setSelectedInstructors([instructor]);
                setView('receipt');
            };

            return (
                <div className="max-w-7xl mx-auto my-8 p-4 flex gap-6 flex-col lg:flex-row print-hide">
                    <div className="w-full lg:w-1/3 space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-xl border-t-8 border-purple-600">
                            <h2 className="text-xl font-bold mb-4 text-purple-900">🏢 系統自訂設定</h2>
                            <div className="space-y-4">
                                <div><label className="text-xs font-bold text-gray-400">學校/單位全銜</label><input type="text" className="w-full p-2 border rounded-lg bg-gray-50" placeholder="如：基隆市立成功國民中學" value={sysConfig.schoolName} onChange={e => setSysConfig({...sysConfig, schoolName: e.target.value})} /></div>
                                <div><label className="text-xs font-bold text-gray-400">管理組別/處室名稱</label><input type="text" className="w-full p-2 border rounded-lg bg-gray-50" placeholder="如：總務處 出納組" value={sysConfig.deptName} onChange={e => setSysConfig({...sysConfig, deptName: e.target.value})} /></div>
                                <button onClick={handleUpdateSysConfig} className="w-full py-2 bg-purple-600 text-white rounded-xl font-bold text-sm hover:bg-purple-700 shadow-md transition-colors">套用系統名稱</button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-xl border-t-8 border-blue-600">
                            <h2 className="text-xl font-bold mb-4 text-gray-800 border-b pb-2">1. 領據細節設定</h2>
                            <div className="space-y-4 text-sm">
                                <div><label className="text-xs font-bold text-gray-400">款項用途/說明</label><input type="text" className="w-full p-2 border rounded-lg bg-gray-50" value={config.activityName} onChange={e => setConfig({...config, activityName: e.target.value})} /></div>
                                <div><label className="text-xs font-bold text-gray-400">領據支付單位 (此致)</label><input type="text" className="w-full p-2 border rounded-lg bg-gray-50" value={config.schoolName} onChange={e => setConfig({...config, schoolName: e.target.value})} /></div>
                                <div className="flex gap-2">
                                    <div className="flex-1"><label className="block text-center text-[10px] text-gray-400">民國年</label><input type="text" className="w-full p-2 border rounded-lg text-center" value={config.year} onChange={e => setConfig({...config, year: e.target.value})} /></div>
                                    <div className="flex-1"><label className="block text-center text-[10px] text-gray-400">月</label><input type="text" className="w-full p-2 border rounded-lg text-center" value={config.month} onChange={e => setConfig({...config, month: e.target.value})} /></div>
                                    <div className="flex-1"><label className="block text-center text-[10px] text-gray-400">日</label><input type="text" className="w-full p-2 border rounded-lg text-center" value={config.day} onChange={e => setConfig({...config, day: e.target.value})} /></div>
                                </div>
                                <div className="border-t pt-4 mt-6">
                                    <div className="flex justify-between items-center mb-4 text-xs font-bold">明細清單 <button onClick={addItem} className="text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">+ 新增一行</button></div>
                                    {config.items.map((item, idx) => (
                                        <div key={idx} className="border border-gray-100 p-3 mb-4 rounded-xl bg-gray-50 relative shadow-inner">
                                            <button onClick={() => removeItem(idx)} className="absolute -top-2 -right-2 bg-white text-red-500 rounded-full shadow w-6 h-6 border flex items-center justify-center">✕</button>
                                            <div className="grid grid-cols-2 gap-2 mb-2">
                                                <input list="item-list" className="p-2 border rounded-lg text-xs" placeholder="項目" value={item.itemName} onChange={e => updateItem(idx, 'itemName', e.target.value)} />
                                                <input type="date" className="p-2 border rounded-lg text-xs" value={item.itemDate} onChange={e => updateItem(idx, 'itemDate', e.target.value)} />
                                            </div>
                                            <div className="flex gap-1 mb-2">
                                                <input type="time" className="flex-1 p-2 border rounded-lg text-xs" value={item.startTime} onChange={e => updateItem(idx, 'startTime', e.target.value)} />
                                                <input type="time" className="flex-1 p-2 border rounded-lg text-xs" value={item.endTime} onChange={e => updateItem(idx, 'endTime', e.target.value)} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 mb-2">
                                                <div className="flex items-center gap-1 border rounded-lg p-1 bg-white"><span className="text-[10px] text-gray-400">節:</span><input type="number" className="w-full outline-none text-xs" value={item.qty} onChange={e => updateItem(idx, 'qty', Number(e.target.value))} /></div>
                                                <div className="flex items-center gap-1 border rounded-lg p-1 bg-white"><span className="text-[10px] text-gray-400">$:</span><input type="number" className="w-full outline-none text-xs" value={item.price} onChange={e => updateItem(idx, 'price', Number(e.target.value))} /></div>
                                            </div>
                                            <input type="text" className="w-full p-2 border rounded-lg text-[10px] bg-white" placeholder="單筆備註..." value={item.remark || ''} onChange={e => updateItem(idx, 'remark', e.target.value)} />
                                        </div>
                                    ))}
                                    <datalist id="item-list">{itemOptions.map(o => <option key={o} value={o} />)}</datalist>
                                    <div className="p-4 bg-blue-900 rounded-xl text-center font-bold text-white mb-4">總金額：{grandTotal.toLocaleString()} 元</div>
                                </div>
                                <button onClick={() => saveConfig(config)} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">💾 儲存活動設定</button>
                            </div>
                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 bg-white p-8 rounded-2xl shadow-xl border-t-8 border-green-600 h-fit">

                        <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-4 border-b border-gray-100 pb-4">
                            <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                2. 講師歷史清單 
                                <span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded">本機已安全解密</span>
                            </h2>
                            
                            <div className="flex flex-wrap gap-2 w-full xl:w-auto">
                                <button onClick={() => setView('home')} className="flex-1 sm:flex-none bg-gray-200 text-gray-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-300 transition-colors">🏠 首頁</button>
                                <button onClick={handleDownloadTemplate} className="flex-1 sm:flex-none bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-cyan-700 transition-colors">📄 下載範本</button>
                                <label className="flex-1 sm:flex-none bg-teal-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-teal-700 transition-colors cursor-pointer text-center flex items-center justify-center">
                                    📥 匯入Excel
                                    <input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleImportExcel} />
                                </label>
                                <button onClick={() => setIsAddModalOpen(true)} className="flex-1 sm:flex-none bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-green-700 transition-colors">+ 新增</button>
                                <button onClick={handleBatchDownload} className="flex-1 sm:flex-none bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-orange-600 transition-colors">📥 匯出Excel</button>
                                <button onClick={() => setIsClearModalOpen(true)} className="flex-1 sm:flex-none bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-red-700 transition-colors">🗑️ 清空</button>
                                <button onClick={() => setIsChangeE2eeModalOpen(true)} className="flex-1 sm:flex-none bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-indigo-700 transition-colors">🔑 修改密碼</button>
                                <button onClick={handleLogout} className="flex-1 sm:flex-none bg-gray-800 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-gray-900 transition-colors">🚪 登出</button>
                            </div>
                        </div>
                        
                        <div className="relative mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="relative w-full sm:flex-1">
                                <span className="absolute left-3 top-3 text-gray-400">🔍</span>
                                <input type="text" placeholder="搜尋講師..." className="w-full p-3 pl-10 border rounded-2xl bg-gray-50 focus:bg-white transition-all outline-none focus:ring-2 focus:ring-blue-500" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                {selectedIds.size > 0 && <span className="text-sm font-bold text-blue-600 whitespace-nowrap">已勾選 {selectedIds.size} 筆</span>}
                                <button onClick={handleBatchPrint} className="w-full sm:w-auto px-6 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold shadow hover:bg-blue-700 transition-colors flex justify-center items-center gap-2 whitespace-nowrap">
                                    🖨️ 批次處理勾選
                                </button>
                            </div>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left border-collapse">
                                <thead><tr className="bg-gray-100 text-gray-500 text-xs uppercase tracking-wider">
                                    <th className="p-4 w-12 text-center">
                                        <input type="checkbox" className="w-5 h-5 accent-blue-600 cursor-pointer" 
                                            checked={filteredInstructors.length > 0 && selectedIds.size === filteredInstructors.filter(i=>!i.decryptionFailed).length}
                                            onChange={handleSelectAll} 
                                        />
                                    </th>
                                    <th className="p-4">姓名</th>
                                    <th className="p-4 text-center">存摺</th>
                                    <th className="p-4 text-center">簽名</th>
                                    <th className="p-4 text-right">操作</th>
                                </tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {filteredInstructors.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" className="p-8 text-center text-gray-400 font-bold bg-gray-50">
                                                目前沒有講師資料，請直接新增或由首頁進入填寫。
                                            </td>

function ReceiptView({ setView, config, instructors, showToast, sysConfig }) {
    const [showSignature, setShowSignature] = useState(true);
    
    // 雙控設計：支援滑桿與數字填寫
    const [scalePercent, setScalePercent] = useState(85);
    const [marginY, setMarginY] = useState(15);
    const [marginX, setMarginX] = useState(15);
    const [paperSize, setPaperSize] = useState('a4');

    // 核心 PDF 生成引擎：建立隱藏離線畫布確保絕對不跑版
    const createPDF = async () => {
        if (!window.jspdf || !window.html2canvas) {
            showToast('PDF 引擎載入中，請稍候再試...');
            return null;
        }
        
        // 建立離線畫布容器，避免截圖受到螢幕解析度或捲軸的影響
        const tempContainer = document.createElement('div');
        tempContainer.style.position = 'absolute';
        tempContainer.style.top = '-9999px';
        tempContainer.style.left = '0';
        tempContainer.style.width = paperSize === 'a4' ? '210mm' : '176mm';
        tempContainer.style.background = 'white';
        
        const originalPages = document.querySelectorAll('.a4-page');
        originalPages.forEach(page => {
            const clone = page.cloneNode(true);
            
            // 清理影響截圖的樣式，但「絕對保留」原有的 transform: scale 設定
            clone.style.margin = '0';
            clone.style.boxShadow = 'none';
            
            // 移除裁切虛線 (避免出現在正式 PDF 中)
            const cutLines = clone.querySelectorAll('.cut-line');
            cutLines.forEach(el => el.remove());
            
            tempContainer.appendChild(clone);
        });
        
        document.body.appendChild(tempContainer);
        const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: paperSize });

        try {
            const tempPages = tempContainer.childNodes;
            for (let i = 0; i < tempPages.length; i++) {
                if (i > 0) pdf.addPage();
                
                // 強制 html2canvas 使用標準寬度擷取，確保所見即所得
                const canvas = await window.html2canvas(tempPages[i], { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false, 
                    backgroundColor: '#ffffff',
                    windowWidth: tempContainer.scrollWidth 
                });

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            }
            return pdf;
        } catch (error) {
            console.error(error);
            showToast('❌ PDF 產生失敗，請稍候再試。');
            return null;
        } finally {
            if (document.body.contains(tempContainer)) {
                document.body.removeChild(tempContainer);
            }
        }
    };

    // 瀏覽器原生列印：直接產生不跑版的 PDF 並在新分頁彈出觸發列印
    const handleNativePrint = async () => {
        showToast('📄 產生高畫質列印檔中，請稍候...');
        const pdf = await createPDF();
        if (pdf) {
            // 讓 PDF 開啟時自動呼叫列印對話框
            pdf.autoPrint({variant: 'non-conform'});
            const blob = pdf.output('blob');
            const blobUrl = URL.createObjectURL(blob);
            const win = window.open(blobUrl);
            if (!win) {
                showToast('⚠️ 瀏覽器阻擋了彈出視窗，改為直接下載，請開啟檔案後手動列印。');
                pdf.save(`講師領據_列印檔.pdf`);
            }
        }
    };

    const pages = [];
    for(let i = 0; i < instructors.length; i += 2) {
        pages.push(instructors.slice(i, i + 2));
    }

    return (
        <div className="bg-white relative pb-20 print-hide">
            {/* 上方操作列 */}
            <div className="bg-gray-900 text-white p-4 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-[150] shadow-2xl gap-4">
                <div className="flex items-center gap-4 w-full sm:w-auto">
                    <button onClick={() => setView('admin')} className="text-gray-400 hover:text-white flex items-center gap-1 transition-colors whitespace-nowrap">← 返回</button>
                    <span className="font-bold border-l border-gray-700 pl-4 tracking-wide text-sm truncate">
                        排版並列印 {instructors.length} 張領據
                    </span>
                </div>
                
                {/* 產生控制面板 (包含邊界、縮放、匯出按鈕) */}
                <div className="flex flex-wrap items-center justify-end gap-x-6 gap-y-3 w-full lg:w-auto bg-gray-800 p-3 rounded-xl shadow-inner">
                    
                    {/* 雙控設計：邊界滑桿與數值輸入區塊 */}
                    <div className="flex items-center gap-4 bg-gray-700 px-4 py-2 rounded-lg border border-gray-600 w-full sm:w-auto">
                        <label className="flex items-center gap-2 text-xs font-bold text-gray-300">
                            ↔️ 左右距:
                            <input type="range" min="0" max="80" step="1" value={marginX} onChange={(e) => setMarginX(parseFloat(e.target.value))} className="w-16 accent-yellow-400 hidden lg:block" />
                            <input type="number" min="0" max="80" value={marginX} onChange={(e) => setMarginX(parseInt(e.target.value) || 0)} className="w-12 px-1 text-center text-black rounded outline-none" /> mm
                        </label>
                        <label className="flex items-center gap-2 text-xs font-bold text-gray-300 border-l border-gray-500 pl-4">
                            ↕️ 上下距:
                            <input type="range" min="0" max="80" step="1" value={marginY} onChange={(e) => setMarginY(parseFloat(e.target.value))} className="w-16 accent-yellow-400 hidden lg:block" />
                            <input type="number" min="0" max="80" value={marginY} onChange={(e) => setMarginY(parseInt(e.target.value) || 0)} className="w-12 px-1 text-center text-black rounded outline-none" /> mm
                        </label>
                    </div>

                    <div className="flex items-center gap-4 w-full sm:w-auto">
                        <label className="flex items-center gap-2 text-xs font-bold text-gray-300">
                            🔍 縮放:
                            <input type="range" min="50" max="150" step="1" value={scalePercent} onChange={(e) => setScalePercent(parseInt(e.target.value) || 100)} className="w-16 accent-blue-500 hidden sm:block" />
                            <input type="number" min="10" max="200" step="1" value={scalePercent} onChange={(e) => setScalePercent(parseInt(e.target.value) || 100)} className="w-12 px-1 text-center text-black rounded outline-none" /> %
                        </label>
                        <label className="flex items-center gap-1 cursor-pointer text-xs font-bold text-gray-300 hover:text-white transition-colors border-l border-gray-600 pl-4">
                            <input type="checkbox" checked={showSignature} onChange={(e) => setShowSignature(e.target.checked)} className="w-4 h-4 accent-blue-500 cursor-pointer" />
                            簽名
                        </label>
                    </div>
                    
                    <div className="flex items-center gap-2 w-full sm:w-auto">
                        <button onClick={handleNativePrint} className="flex-1 sm:flex-none bg-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md flex justify-center items-center gap-2 active:scale-95 transition-all text-sm whitespace-nowrap">
                            🖨️ 產生 PDF 並列印
                        </button>
                    </div>
                </div>
            </div>
            
            {/* 預覽與列印內容區塊 */}
            <div className="w-full flex flex-col items-center py-10 bg-gray-200 min-h-screen">
                <div id="print-root" className="w-full mx-auto flex flex-col items-center">
                    
                    {pages.map((pageInstructors, pageIndex) => (
                        <div key={pageIndex} className="bg-white shadow-2xl mb-8 relative a4-page flex flex-col justify-between"
                             style={{ 
                                 width: paperSize === 'a4' ? '210mm' : '176mm', 
                                 minWidth: paperSize === 'a4' ? '210mm' : '176mm',
                                 height: paperSize === 'a4' ? '297mm' : '250mm', 
                                 padding: `${marginY}mm ${marginX}mm`,
                                 boxSizing: 'border-box', 
                                 backgroundColor: 'white',
                                 overflow: 'hidden'
                             }}>
                            
                            {pageInstructors.map((instructor, itemIndex) => (
                                <React.Fragment key={instructor.id}>
                                    <div className="flex-1 flex flex-col justify-start items-center overflow-hidden w-full relative">
                                        {/* Transform scale 控制內容大小 */}
                                        <div className="scale-container" style={{ transform: `scale(${scalePercent / 100})`, transformOrigin: 'top center', width: `${100 / (scalePercent / 100)}%` }}>
                                            <ReceiptTemplate config={config} instructor={instructor} sysConfig={sysConfig} showSignature={showSignature} />
                                        </div>
                                    </div>
                                    
                                    {/* 兩張領據中間的裁切虛線 */}
                                    {itemIndex === 0 && pageInstructors.length > 1 && (
                                        <div className="cut-line w-full border-t border-dashed border-gray-400 relative flex items-center justify-center" style={{ height: '0', margin: '2mm 0' }}>
                                            <span className="absolute bg-white px-2 text-gray-500 text-[10px] tracking-widest">✂️ 裁切線 (列印時隱藏)</span>
                                        </div>
                                    )}
                                </React.Fragment>
                            ))}
                            
                            {pageInstructors.length === 1 && (
                                <div className="flex-1 flex flex-col justify-start items-center overflow-hidden w-full relative"></div>
                            )}
                        </div>
                    ))}

                </div>
            </div>
        </div>
    );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
