<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 基礎 XSS 防護 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss: data: blob:;">
    <title>經費領據管理系統 (端到端加密版)</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 載入 Babel Standalone 用於在瀏覽器即時編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="m-0 p-0 text-gray-900 bg-gray-50">
    <div id="root"></div>

    <!-- data-presets="react" 確保瀏覽器能正確看懂 React 語法 -->
    <script type="text/babel" data-type="module" data-presets="react">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // 🔥 系統同步頻道設定
        // ==========================================
        const MY_PROJECT_ID = typeof __app_id !== 'undefined' ? __app_id : "Taiwan-Teachers-Secure-Receipt"; 

        // ==========================================
        // ⚠️ 第一階段任務：請在此處填入您的 Firebase 設定
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // 👇 👇 👇 未來要上傳 GitHub 時，將 Firebase 控制台給您的設定貼在這裡 👇 👇 👇
            // apiKey: "xxxxxxxxx",
            // authDomain: "xxxxxxxxx",
            // projectId: "xxxxxxxxx",
            // storageBucket: "xxxxxxxxx",
            // messagingSenderId: "xxxxxxxxx",
            // appId: "xxxxxxxxx"
            // 👆 👆 👆 未來要上傳 GitHub 時，將 Firebase 控制台給您的設定貼在這裡 👆 👆 👆
        };

        // 防呆機制：如果忘記填寫金鑰，給予友善的圖文提示
        if (!firebaseConfig.apiKey && typeof __firebase_config === 'undefined') {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gray-100 print:hidden">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-lg w-full border-t-8 border-red-500 text-center animate-in zoom-in-95">
                        <h1 className="text-5xl mb-4">⚠️</h1>
                        <h2 className="text-2xl font-bold text-red-600 mb-4">尚未設定 Firebase 金鑰</h2>
                        <div className="text-gray-600 text-left space-y-2 bg-red-50 p-5 rounded-xl border border-red-100 text-sm leading-relaxed">
                            <p className="font-bold text-red-800">系統偵測到您的 <code>firebaseConfig</code> 還是空白的。</p>
                            <p>這會導致網頁無法連線而當機。請按照以下步驟完成設定：</p>
                            <ol className="list-decimal ml-5 mt-2 space-y-1 font-medium">
                                <li>用記事本打開您的 <code>index.html</code></li>
                                <li>找到第 36 行附近的 <code>const firebaseConfig = &#123; ... &#125;</code></li>
                                <li>將您從 Firebase 控制台複製的真實金鑰貼進去<br/>(注意：要記得把 <code>//</code> 註解符號拿掉喔！)</li>
                                <li>存檔並重新上傳到 GitHub，重新整理網頁即可！</li>
                            </ol>
                        </div>
                    </div>
                </div>
            );
            throw new Error("Missing Firebase Config");
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 工具函數 ---
        const numberToChinese = (num) => {
            if (!num || isNaN(num) || num === 0) return "零元整";
            const digits = ['零', '壹', '貳', '參', '肆', '伍', '陸', '柒', '捌', '玖'];
            const units = ['', '拾', '佰', '仟', '萬', '拾', '佰', '仟', '億'];
            let str = Math.round(num).toString();
            let res = '';
            for (let i = 0; i < str.length; i++) {
                let n = parseInt(str[i]);
                let u = str.length - 1 - i;
                if (n !== 0) { res += digits[n] + units[u]; } 
                else {
                    if (res[res.length - 1] !== '零' && u !== 0 && u !== 4 && u !== 8) res += '零';
                    if (u === 4 && res[res.length - 1] !== '萬') res += '萬';
                    if (u === 8 && res[res.length - 1] !== '億') res += '億';
                }
            }
            return res.replace(/零+$/, '').replace(/零萬/, '萬').replace(/零億/, '億') + '元整';
        };

        const formatTWDate = (dateStr) => {
            if (!dateStr) return '';
            if (dateStr.includes('/')) return dateStr;
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parseInt(parts[0], 10) - 1911}/${parts[1]}/${parts[2]}`;
            }
            return dateStr;
        };

        const validatePassword = (pw) => {
            // 放寬密碼限制：至少 6 碼，包含英文與數字即可
            const regex = /^(?=.*[a-zA-Z])(?=.*[0-9])(?=.{6,})/;
            return regex.test(pw);
        };

        const generateRandomKey = () => {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
            const randomValues = new Uint32Array(32);
            window.crypto.getRandomValues(randomValues);
            let pwd = "";
            for (let i = 0; i < 32; i++) {
                pwd += chars[randomValues[i] % chars.length];
            }
            return pwd;
        };

        const maskIdNumber = (id) => {
            if (!id) return '無個資';
            if (id.length < 8) return '***'; 
            return `${id.substring(0, 3)}****${id.substring(id.length - 3)}`;
        };

        const encryptPayload = (dataObj, key) => {
            if (!window.CryptoJS) return null;
            return window.CryptoJS.AES.encrypt(JSON.stringify(dataObj), key).toString();
        };

        const decryptPayload = (ciphertext, key) => {
            if (!window.CryptoJS || !ciphertext) return null;
            try {
                const bytes = window.CryptoJS.AES.decrypt(ciphertext, key);
                const decryptedStr = bytes.toString(window.CryptoJS.enc.Utf8);
                if (!decryptedStr) return null; 
                return JSON.parse(decryptedStr);
            } catch(e) { 
                return null; 
            }
        };

        const compressImage = (file, maxWidth = 600) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            let scaleSize = 1;
                            if (img.width > maxWidth) scaleSize = maxWidth / img.width;
                            canvas.width = img.width * scaleSize;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
                            canvas.width = 0; canvas.height = 0; img.src = '';
                            resolve(dataUrl); 
                        } catch (err) {
                            reject(err);
                        }
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        };

        function Toast({ message, onClose }) {
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(onClose, 4000);
                    return () => clearTimeout(timer);
                }
            }, [message, onClose]);
            if (!message) return null;
            return (
                <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] z-[9999] flex items-center gap-4 min-w-[300px] justify-between border border-gray-700 animate-in slide-in-from-bottom-5 print:hidden">
                    <span className="font-bold tracking-wide">{message}</span>
                    <button onClick={onClose} className="text-gray-400 hover:text-white font-bold text-xl">✕</button>
                </div>
            );
        }

        const EyeIcon = ({ show }) => (
            show ? (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            ) : (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            )
        );

        const ReceiptTemplate = ({ config, instructor, sysConfig, showSignature = true }) => {
            const totalAmount = config.items ? config.items.reduce((sum, item) => sum + (item.qty * item.price), 0) : 0;
            const chineseAmount = numberToChinese(totalAmount);

            const tableStyle = { width: '100%', borderCollapse: 'collapse', border: '2px solid #000', tableLayout: 'fixed', fontSize: '0.95rem', fontFamily: "'DFKai-sb', 'BiauKai', '標楷體', serif" };
            const tdStyle = { border: '1px solid #000', padding: '4px 6px', verticalAlign: 'middle', color: '#000' };
            const centerBold = { ...tdStyle, textAlign: 'center', fontWeight: 'bold', whiteSpace: 'nowrap' };
            
            const bgCyan = { backgroundColor: '#d1fae5', WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' };
            const bgYellow = { backgroundColor: '#fef08a', WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' };

            return (
                <div style={{ width: '800px', minWidth: '800px', margin: '0 auto', boxSizing: 'border-box', background: '#fff' }}>
                    <div style={{ textAlign: 'center', fontSize: '2.2rem', fontWeight: 'bold', letterSpacing: '2em', marginBottom: '15px', marginLeft: '2em', fontFamily: "'DFKai-sb', 'BiauKai', '標楷體', serif" }}>
                        領據
                    </div>

                    <table style={tableStyle}>
                        <colgroup><col style={{width: '18%'}}/><col style={{width: '32%'}}/><col style={{width: '18%'}}/><col style={{width: '32%'}}/></colgroup>
                        <tbody>
                            <tr><td style={centerBold}>茲收到</td><td colSpan="3" style={{...tdStyle, ...bgCyan}}>{config.activityName}</td></tr>
                            <tr><td style={centerBold}>計新臺幣</td><td colSpan="3" style={{...tdStyle, textAlign: 'center', fontSize: '1.4rem', fontWeight: 'bold', letterSpacing: '0.2em'}}>{chineseAmount}</td></tr>
                            <tr><td colSpan="4" style={{...tdStyle, paddingLeft: '2rem'}}>此致</td></tr>
                            <tr><td colSpan="4" style={{...tdStyle, paddingLeft: '2rem', fontSize: '1.2rem', fontWeight: 'bold'}}>{config.schoolName}</td></tr>
                            <tr>
                                <td style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>具領人簽章：</td>
                                <td style={{...tdStyle, padding: '0', height: '40px', position: 'relative'}}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: '100%', padding: '0 10px' }}>
                                        <span style={{ fontSize: '1.1rem', fontWeight: 'bold', wordBreak: 'break-all', maxWidth: '45%' }}>{instructor.name}</span>
                                        {showSignature && instructor.signatureUrl && <img src={instructor.signatureUrl} alt="Signature" style={{ height: '100%', maxHeight: '35px', maxWidth: '55%', objectFit: 'contain' }} />}
                                    </div>
                                </td>
                                <td style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>身分證字號：</td>
                                <td style={{...tdStyle, textAlign: 'center'}}>{instructor.idNumber}</td>
                            </tr>
                            <tr><td style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>戶籍地址：</td><td colSpan="3" style={{...tdStyle, paddingLeft: '1rem'}}>{instructor.address}</td></tr>
                            <tr>
                                <td rowSpan="3" style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>匯款 帳號：</td>
                                <td colSpan="3" style={{...tdStyle, paddingLeft: '1rem'}}>
                                    <span style={{fontWeight: 'bold'}}>{instructor.bankType === 'bank' ? '■' : '□'}</span> 銀行： 
                                    {instructor.bankType === 'bank' ? ( <> <span style={{margin: '0 8px', textDecoration: 'underline'}}>{instructor.bankName || '　　'}</span> 銀行 <span style={{margin: '0 8px', textDecoration: 'underline'}}>{instructor.bankBranch || '　　'}</span> 分行 &nbsp;&nbsp;帳號：<span style={{margin: '0 8px', textDecoration: 'underline'}}>{instructor.bankAccount || '　　　　　　'}</span> </>
                                    ) : ( <> <span style={{margin: '0 8px'}}>　　</span> 銀行 <span style={{margin: '0 8px'}}>　　</span> 分行 &nbsp;&nbsp;帳號：<span style={{margin: '0 8px'}}>　　　　　　</span> </> )}
                                </td>
                            </tr>
                            <tr>
                                <td colSpan="3" style={{...tdStyle, paddingLeft: '1rem'}}>
                                    <span style={{fontWeight: 'bold'}}>{instructor.bankType === 'post' ? '■' : '□'}</span> 郵局：局號： 
                                    {instructor.bankType === 'post' ? ( <> <span style={{margin: '0 8px', textDecoration: 'underline'}}>{instructor.postOffice || '　　　　'}</span> &nbsp;&nbsp;帳號： <span style={{margin: '0 8px', textDecoration: 'underline'}}>{instructor.postAccount || '　　　　　　'}</span> </>
                                    ) : ( <> <span style={{margin: '0 8px'}}>　　　　</span> &nbsp;&nbsp;帳號： <span style={{margin: '0 8px'}}>　　　　　　</span> </> )}
                                </td>
                            </tr>
                            <tr><td colSpan="3" style={{...tdStyle, paddingLeft: '1rem'}}><span style={{fontWeight: 'bold'}}>{instructor.bankType === 'other' ? '■' : '□'}</span> 其他：親自領取</td></tr>
                            <tr>
                                <td style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>聯絡電話：</td><td style={{...tdStyle, textAlign: 'center'}}>{instructor.phone}</td>
                                <td style={{...tdStyle, textAlign: 'center', whiteSpace: 'nowrap'}}>已登列所得</td><td style={tdStyle}></td>
                            </tr>
                            <tr>
                                <td colSpan="4" style={{...tdStyle, textAlign: 'center', padding: '6px 0', fontSize: '1rem'}}>
                                    中華民國 <span style={{margin: '0 20px', fontWeight: 'bold'}}>{config.year}</span> 年 <span style={{margin: '0 20px', fontWeight: 'bold'}}>{config.month}</span> 月 <span style={{margin: '0 20px', fontWeight: 'bold'}}>{config.day}</span> 日
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <table style={{...tableStyle, borderTop: '4px double #000', marginTop: '8px'}}>
                        <colgroup><col style={{width: '14%'}}/><col style={{width: '18%'}}/><col style={{width: '20%'}}/><col style={{width: '8%'}}/><col style={{width: '12%'}}/><col style={{width: '14%'}}/><col style={{width: '14%'}}/></colgroup>
                        <tbody>
                            <tr><td style={centerBold}>項 目</td><td style={centerBold}>上課日期</td><td style={centerBold}>起訖時間</td><td style={centerBold}>節數</td><td style={centerBold}>單 價</td><td style={centerBold}>應領金額</td><td style={centerBold}>備 註</td></tr>
                            {config.items && config.items.map((item, index) => (
                                <tr key={index}>
                                    <td style={{...tdStyle, textAlign: 'center'}}>{item.itemName}</td>
                                    <td style={{...tdStyle, textAlign: 'center'}}>{formatTWDate(item.itemDate)}</td>
                                    <td style={{...tdStyle, textAlign: 'center'}}>{item.startTime && item.endTime ? `${item.startTime}~${item.endTime}` : ''}</td>
                                    <td style={{...tdStyle, textAlign: 'center'}}>{item.qty}</td>
                                    <td style={{...tdStyle, textAlign: 'center'}}>{item.price.toLocaleString()}</td>
                                    <td style={{...tdStyle, textAlign: 'center', fontWeight: 'bold', color: '#b91c1c', ...bgYellow}}>{(item.qty * item.price).toLocaleString()}</td>
                                    <td style={{...tdStyle, textAlign: 'center', fontSize: '0.85rem'}}>{item.remark || ''}</td>
                                </tr>
                            ))}
                            <tr><td colSpan="7" style={{...tdStyle, fontSize: '0.8rem', padding: '2px 8px'}}>備註：課表於業務單位留存</td></tr>
                        </tbody>
                    </table>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [isAppReady, setIsAppReady] = useState(false);
            const [isAuthFetched, setIsAuthFetched] = useState(false);
            
            const [instructorsRaw, setInstructorsRaw] = useState([]);
            const [selectedInstructors, setSelectedInstructors] = useState([]); 
            const [itemOptions, setItemOptions] = useState(["鐘點費", "諮詢費", "交通費", "出席費"]);
            const [toastMsg, setToastMsg] = useState('');
            const [sysConfig, setSysConfig] = useState({ schoolName: '基隆市立成功國民中學', deptName: '教務處' });
            
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [adminLoginPwd, setAdminLoginPwd] = useState(null); 
            const [adminKey, setAdminKey] = useState(null); 
            
            const [authConfig, setAuthConfig] = useState({ verifyToken: null, publicKey: null, encryptedPrivateKey: null, allowSkipPwd: true });

            const showToast = (msg) => setToastMsg(msg);
            const today = new Date().toISOString().split('T')[0];

            const [config, setConfig] = useState({
                activityName: "114學年度國民中小學雙語生活化校園計畫－諮詢費",
                schoolName: "基隆市立成功國民中學",
                year: "115", month: "05", day: "12",
                items: [{ itemName: "鐘點費", itemDate: today, startTime: "11:00", endTime: "13:00", qty: 2, price: 1000, remark: "" }]
            });

            useEffect(() => {
                const loadScripts = async () => {
                    const scripts = [
                        { id: 'crypto-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js' },
                        { id: 'jsencrypt-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js' },
                        { id: 'xlsx-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js' },
                        { id: 'jszip-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js' },
                        { id: 'filesaver-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js' },
                        { id: 'html2canvas-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js' },
                        { id: 'jspdf-script', src: 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js' }
                    ];
                    for (let s of scripts) {
                        if (!document.getElementById(s.id)) {
                            await new Promise(resolve => {
                                const script = document.createElement('script');
                                script.id = s.id; 
                                script.src = s.src;
                                script.crossOrigin = "anonymous";
                                script.onload = resolve;
                                document.body.appendChild(script);
                            });
                        }
                    }
                    setIsAppReady(true);
                };
                loadScripts();
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        }
                    } catch (error) { console.error(error); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 處理 Google 登入視窗的邏輯
            const handleGoogleLogin = async () => {
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error(error);
                    alert("登入失敗，請確認您的網路連線或稍後再試。\n錯誤訊息: " + error.message);
                }
            };

            useEffect(() => {
                if (!user || !isAppReady) return;
                
                const unsubConfig = onSnapshot(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'current'), (docSnap) => {
                    if (docSnap.exists()) {
                        let data = docSnap.data();
                        if (!data.items && data.itemName) {
                            data.items = [{ itemName: data.itemName, itemDate: data.itemDate || today, startTime: "11:00", endTime: "13:00", qty: data.qty, price: data.price, remark: data.remark || "" }];
                        }
                        setConfig(data);
                    }
                }, (err) => console.error(err));
                
                const unsubSys = onSnapshot(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'system'), (docSnap) => {
                    if (docSnap.exists()) setSysConfig(docSnap.data());
                }, (err) => console.error(err));
                
                const unsubOptions = onSnapshot(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'options'), (docSnap) => {
                    if (docSnap.exists() && docSnap.data().itemNames) setItemOptions(docSnap.data().itemNames);
                }, (err) => console.error(err));
                
                const unsubAuth = onSnapshot(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setAuthConfig({
                            verifyToken: data.verifyToken || null,
                            publicKey: data.publicKey || null,
                            encryptedPrivateKey: data.encryptedPrivateKey || null,
                            allowSkipPwd: data.allowSkipPwd !== false
                        });
                    } else {
                        setAuthConfig({ verifyToken: null, publicKey: null, encryptedPrivateKey: null, allowSkipPwd: true });
                    }
                    setIsAuthFetched(true);
                }, (err) => {
                    console.error(err);
                    setIsAuthFetched(true);
                });

                let unsubInstructors = () => {};
                if (isAdminAuthenticated && adminKey) {
                    unsubInstructors = onSnapshot(collection(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors'), (snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        list.sort((a, b) => b.createdAt - a.createdAt);
                        setInstructorsRaw(list);
                    }, (err) => {
                        console.error(err);
                    });
                } else {
                    setInstructorsRaw([]); 
                }

                return () => { unsubConfig(); unsubSys(); unsubOptions(); unsubAuth(); unsubInstructors(); };
            }, [user, today, isAppReady, isAdminAuthenticated, adminKey]);

            const saveConfig = async (newConfig) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'current'), newConfig);
                    const currentItemNames = newConfig.items.map(i => i.itemName).filter(Boolean);
                    const newOptions = Array.from(new Set([...itemOptions, ...currentItemNames]));
                    if (newOptions.length > itemOptions.length) {
                        await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'options'), { itemNames: newOptions }, { merge: true });
                    }
                    showToast('💾 活動設定已更新成功！');
                } catch (err) { showToast('儲存失敗'); }
            };

            if (!isAppReady) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-gray-500 font-bold tracking-widest">系統與連線模組載入中...</p>
                </div>
            );

            // 強制登入的閘門畫面 (如果尚未登入，將顯示此畫面擋住所有內容)
            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4 print:hidden">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-blue-500 animate-in zoom-in-95">
                        <div className="text-6xl mb-6">🎓</div>
                        <h2 className="text-3xl font-extrabold text-gray-800 mb-2">經費領據系統</h2>
                        <p className="text-gray-500 mb-8 font-medium">為確保資料安全與實名認證，請先登入</p>
                        
                        <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-200 rounded-2xl px-6 py-4 text-gray-700 font-bold hover:bg-gray-50 hover:border-blue-300 transition-all shadow-sm active:scale-95">
                            <svg className="w-6 h-6" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 15.02 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            <span className="text-lg">使用 Google 帳號登入</span>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen bg-gray-50 font-sans text-gray-900 print:bg-white print:m-0 print:p-0" id="app-main-view">
                    <div className="flex-1 pb-12 print:pb-0 print:m-0 print:p-0">
                        {view === 'home' && <HomeView setView={setView} sysConfig={sysConfig} />}
                        
                        {view === 'admin' && (
                            <AdminAuthWrapper authConfig={authConfig} isAuthFetched={isAuthFetched} adminLoginPwd={adminLoginPwd} setAdminLoginPwd={setAdminLoginPwd} adminKey={adminKey} setAdminKey={setAdminKey} isAdminAuthenticated={isAdminAuthenticated} setIsAdminAuthenticated={setIsAdminAuthenticated} showToast={showToast} setView={setView} user={user}>
                                <AdminView setView={setView} config={config} setConfig={setConfig} saveConfig={saveConfig} instructorsRaw={instructorsRaw} setSelectedInstructors={setSelectedInstructors} showToast={showToast} itemOptions={itemOptions} today={today} sysConfig={sysConfig} setSysConfig={setSysConfig} authConfig={authConfig} adminLoginPwd={adminLoginPwd} setAdminLoginPwd={setAdminLoginPwd} adminKey={adminKey} setAdminKey={setAdminKey} setIsAdminAuthenticated={setIsAdminAuthenticated} user={user} auth={auth} />
                            </AdminAuthWrapper>
                        )}
                        
                        {view === 'instructor' && <InstructorView setView={setView} showToast={showToast} config={config} sysConfig={sysConfig} authConfig={authConfig} user={user} />}
                        
                        {view === 'receipt' && <ReceiptView setView={setView} config={config} instructors={selectedInstructors} showToast={showToast} sysConfig={sysConfig} />}
                    </div>
                    
                    <div className="text-center text-gray-400 text-sm py-4 print-hide font-bold">
                        @2026 Master
                    </div>

                    <Toast message={toastMsg} onClose={() => setToastMsg('')} />
                </div>
            );
        }

        function HomeView({ setView, sysConfig }) {
            return (
                <div className="flex flex-col items-center justify-center min-h-[85vh] p-6 print-hide">
                    <div className="text-center mb-10 space-y-2">
                        <h1 className="text-3xl sm:text-4xl font-extrabold text-blue-600 tracking-tight">
                            {sysConfig.schoolName} {sysConfig.deptName}
                        </h1>
                        <h1 className="text-3xl sm:text-4xl font-extrabold text-blue-900 tracking-tight">
                            經費領據管理系統
                        </h1>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-8 w-full max-w-2xl">
                        <button onClick={() => setView('instructor')} className="flex-1 bg-white border-2 border-green-500 text-green-700 p-10 rounded-2xl shadow-xl hover:shadow-2xl hover:bg-green-50 transition-all duration-300 flex flex-col items-center group">
                            <span className="text-5xl mb-4 group-hover:scale-110 transition-transform">✍️</span>
                            <span className="text-2xl font-bold">我是講師</span>
                            <span className="text-sm mt-3 text-gray-500">免密碼，全自動高強度安全加密</span>
                        </button>
                        <button onClick={() => setView('admin')} className="flex-1 bg-white border-2 border-blue-600 text-blue-800 p-10 rounded-2xl shadow-xl hover:shadow-2xl hover:bg-blue-50 transition-all duration-300 flex flex-col items-center group">
                            <span className="text-5xl mb-4 group-hover:scale-110 transition-transform">⚙️</span>
                            <span className="text-2xl font-bold">行政管理員</span>
                            <span className="text-sm mt-3 text-gray-500">一鍵解密與管理</span>
                        </button>
                    </div>
                </div>
            );
        }

        function AdminAuthWrapper({ authConfig, isAuthFetched, adminLoginPwd, setAdminLoginPwd, adminKey, setAdminKey, isAdminAuthenticated, setIsAdminAuthenticated, showToast, children, setView, user }) {
            const [loginKey, setLoginKey] = useState('');
            const [showLoginKey, setShowLoginKey] = useState(false);
            
            const [newKey, setNewKey] = useState('');
            const [newKeyConfirm, setNewKeyConfirm] = useState('');
            const [showNewKey, setShowNewKey] = useState(false);
            const [showConfirmKey, setShowConfirmKey] = useState(false);

            if (!isAuthFetched) {
                return (
                    <div className="max-w-md mx-auto my-20 p-8 bg-white rounded-3xl shadow-2xl border border-gray-100 flex flex-col items-center justify-center min-h-[300px] print-hide">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-gray-500 font-bold tracking-widest">系統安全驗證中...</p>
                    </div>
                );
            }

            if (!authConfig.verifyToken) {
                const handleInitSystem = async (e) => {
                    e.preventDefault();
                    if (!user) return showToast("❌ 尚未完成系統連線，請稍後");
                    if (newKey !== newKeyConfirm) return alert("❌ 兩次輸入的密碼不一致！");
                    if (!validatePassword(newKey)) return alert("❌ 密碼強度不足！\n\n請至少輸入 6 個字元，且必須同時包含「英文」與「數字」。\n(已為您放寬原本需要特殊符號的限制)");
                    try {
                        const token = encryptPayload('master-check', newKey);
                        await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), { verifyToken: token }, { merge: true });
                        setAdminLoginPwd(newKey);
                        setIsAdminAuthenticated(true);
                        showToast('✅ 管理者登入密碼設定完成！請接續設定公鑰憑證。');
                    } catch(e) { 
                        console.error("Firebase SetDoc Error:", e);
                        if (e.code === 'permission-denied') {
                            alert("❌ 儲存失敗：資料庫權限不足！\n\n請回到 Firebase 控制台 -> Firestore Database -> Rules (規則)，檢查是否已貼上教學中的設定並發布。");
                        } else {
                            alert("❌ 系統初始化失敗\n原因：" + e.message + "\n\n請確認您是否已在 Firebase 左側選單中，點擊並建立了「Firestore Database」資料庫！");
                        }
                    }
                };

                const handleSkipPwdInit = async () => {
                    try {
                        const token = encryptPayload('master-check', 'admin');
                        await setDoc(doc(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'config', 'auth'), { verifyToken: token }, { merge: true });
                        setAdminLoginPwd('admin');
                        setIsAdminAuthenticated(true);
                        showToast("已使用預設密碼 admin 進入測試模式。");
                    } catch(e) {
                        console.error("Firebase SetDoc Error:", e);
                        if (e.code === 'permission-denied') {
                            alert("❌ 儲存失敗：資料庫權限不足！\n\n請回到 Firebase 控制台 -> Firestore Database -> Rules (規則)，檢查是否已設定正確。");
                        } else {
                            alert("❌ 系統初始化設定失敗\n原因：" + e.message + "\n\n請確認您是否已在 Firebase 建立「Firestore Database」！");
                        }
                    }
                };

                return (
                    <div className="max-w-md mx-auto my-20 p-8 bg-white rounded-3xl shadow-2xl border-t-8 border-indigo-600 animate-in zoom-in-95 relative overflow-hidden print-hide">
                        <button onClick={() => setView('home')} className="mb-6 text-gray-400 hover:text-gray-600 flex items-center gap-1">← 返回首頁</button>
                        
                        <h2 className="text-2xl font-bold mb-4 text-center text-indigo-900">🛡️ 步驟一：設定登入密碼</h2>
                        <p className="text-sm text-gray-500 mb-6 text-justify bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                            歡迎啟用！請先設定您的**【管理員密碼】**。這組密碼將用來登入後台，並作為日後保護私鑰的基礎。
                        </p>
                        <form onSubmit={handleInitSystem} className="space-y-4">
                            <div className="relative">
                                <input required type={showNewKey ? "text" : "password"} placeholder="設定管理密碼 (大小寫+數字)" className="w-full p-4 border rounded-xl pr-12 focus:border-indigo-500 outline-none" value={newKey} onChange={e => setNewKey(e.target.value)} />
                                <button type="button" onClick={() => setShowNewKey(!showNewKey)} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-500"><EyeIcon show={showNewKey} /></button>
                            </div>
                            <div className="relative">
                                <input required type={showConfirmKey ? "text" : "password"} placeholder="再次確認密碼" className="w-full p-4 border rounded-xl pr-12 focus:border-indigo-500 outline-none" value={newKeyConfirm} onChange={e => setNewKeyConfirm(e.target.value)} />
                                <button type="button" onClick={() => setShowConfirmKey(!showConfirmKey)} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-500"><EyeIcon show={showConfirmKey} /></button>
                            </div>
                            <div className="flex gap-4 mt-6">
                                {authConfig.allowSkipPwd !== false && (
                                    <button type="button" onClick={handleSkipPwdInit} className="flex-1 py-4 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition-colors">稍後設定</button>
                                )}
                                <button type="submit" className="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-lg">設定並登入</button>
                            </div>
                        </form>
                    </div>
                );
            }

            if (!isAdminAuthenticated) {
                const handleVerifyLogin = (e) => {
                    e.preventDefault();
                    const checkWord = authConfig.verifyToken ? decryptPayload(authConfig.verifyToken, loginKey) : null;
                    
                    if (checkWord === 'master-check') {
                        if (authConfig.encryptedPrivateKey) {
                            try {
                                const bytes = window.CryptoJS.AES.decrypt(authConfig.encryptedPrivateKey, loginKey);
                                const privKey = bytes.toString(window.CryptoJS.enc.Utf8);
                                if (privKey) {
                                    setAdminLoginPwd(loginKey);
                                    setAdminKey(privKey);
                                    setIsAdminAuthenticated(true); 
                                    showToast("✅ 登入成功！資料已自動解密。");
                                } else {
                                    showToast("❌ 私鑰解密失敗，密碼可能不匹配或資料損毀。");
                                }
                            } catch(err) {
                                showToast("❌ 系統解密異常。");
                            }
                        } else {
                            setAdminLoginPwd(loginKey);
                            setIsAdminAuthenticated(true);
                            showToast("✅ 登入成功！請接續設定公鑰憑證。");
                        }
                    } else {
                        showToast("❌ 密碼錯誤，請重新輸入。");
                    }
                };

                return (
                    <div className="max-w-md mx-auto my-20 p-8 bg-white rounded-3xl shadow-2xl border border-gray-100 animate-in zoom-in-95 print-hide">
                        <button onClick={() => setView('home')} className="mb-6 text-gray-400 hover:text-gray-600 flex items-center gap-1">← 返回首頁</button>
                        <div className="text-center mb-6">
                            <span className="text-5xl inline-block mb-4">🔐</span>
                            <h2 className="text-2xl font-bold text-gray-800">管理員登入</h2>
                            <p className="text-xs text-gray-400 mt-2">請輸入管理員密碼進入後台</p>
                        </div>
                        <form onSubmit={handleVerifyLogin} className="space-y-4">
                            <div className="relative">
                                <input required type={showLoginKey ? "text" : "password"} placeholder="請輸入密碼" className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none text-center text-xl tracking-widest pr-12" value={loginKey} onChange={e => setLoginKey(e.target.value)} />
                                <button type="button" onClick={() => setShowLoginKey(!showLoginKey)} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-500"><EyeIcon show={showLoginKey} /></button>
                            </div>
                            <button type="submit" className="w-full py-4 bg-indigo-900 text-white font-bold rounded-xl hover:bg-black shadow-lg">登入並檢視資料</button>
                        </form>
                    </div>
                );
            }

            return children;
        }

        function InstructorView({ setView, showToast, config, sysConfig, authConfig, user }) {
            const [step, setStep] = useState('form');
            const [formData, setFormData] = useState({ name: '', idNumber: '', address: '', bankType: 'bank', bankName: '', bankBranch: '', bankAccount: '', postOffice: '', postAccount: '', phone: '' });
            const [signatureUrl, setSignatureUrl] = useState(null);
            const [passbookUrl, setPassbookUrl] = useState(null);
            const [isAgreed, setIsAgreed] = useState(false);
            const [isSignModalOpen, setIsSignModalOpen] = useState(false);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                if (isSignModalOpen) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = '';
                return () => { document.body.style.overflow = ''; };
            }, [isSignModalOpen]);

            useEffect(() => {
                if (!isSignModalOpen || !canvasRef.current) return;
                const canvasEl = canvasRef.current;
                let timeoutId;
                const initCanvas = () => {
                    if (!canvasEl) return;
                    const ctx = canvasEl.getContext('2d');
                    const rect = canvasEl.parentElement.getBoundingClientRect();
                    canvasEl.width = rect.width; canvasEl.height = rect.height;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                };
                timeoutId = setTimeout(initCanvas, 100);
                const preventScroll = (e) => { if (e.cancelable) e.preventDefault(); };
                canvasEl.addEventListener('touchstart', preventScroll, { passive: false });
                canvasEl.addEventListener('touchmove', preventScroll, { passive: false });
                return () => { clearTimeout(timeoutId); canvasEl.removeEventListener('touchstart', preventScroll); canvasEl.removeEventListener('touchmove', preventScroll); };
            }, [isSignModalOpen]);

            const getPos = (e) => {
                if (!canvasRef.current) return { x: 0, y: 0 };
                const canvas = canvasRef.current; const rect = canvas.getBoundingClientRect();
                let clientX = e.clientX; let clientY = e.clientY;
                if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const startDrawing = (e) => { 
                if (!canvasRef.current) return;
                setIsDrawing(true); const pos = getPos(e); 
                canvasRef.current.getContext('2d').beginPath(); 
                canvasRef.current.getContext('2d').moveTo(pos.x, pos.y); 
            };
            const draw = (e) => { 
                if (!isDrawing || !canvasRef.current) return; 
                const pos = getPos(e); 
                canvasRef.current.getContext('2d').lineTo(pos.x, pos.y); 
                canvasRef.current.getContext('2d').stroke(); 
            };
            const stopDrawing = () => { 
                if (isDrawing && canvasRef.current) { 
                    canvasRef.current.getContext('2d').closePath(); setIsDrawing(false); 
                } 
            };
            const clearSignature = () => { 
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasRef.current.width, canvasEl.height);
                setSignatureUrl(null); 
            };
            const confirmSignature = () => { 
                if (!canvasRef.current) return;
                setSignatureUrl(canvasRef.current.toDataURL('image/jpeg', 0.8)); 
                setIsSignModalOpen(false); 
            };

            const handlePhotoUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.type !== 'image/jpeg' && file.type !== 'image/png') {
                    showToast('❌ 僅支援 JPG 或 PNG 格式的圖片');
                    e.target.value = '';
                    return;
                }

                try {
                    const compressed = await compressImage(file, 600); 
                    setPassbookUrl(compressed);
                    showToast('📸 存摺照片已上傳成功');
                } catch (err) { showToast('圖片處理失敗，請換一張試試'); }
            };

            const processAutoEncryptSubmit = async () => {
                if (!user) {
                    showToast('❌ 系統尚未連線完成，請重新整理網頁再試。'); return;
                }
                if (!authConfig.publicKey) {
                    showToast('❌ 系統尚未初始化公鑰，無法加密上傳。請聯繫管理員。'); return;
                }
                if (!window.CryptoJS || !window.JSEncrypt) {
                    showToast('❌ 加密模組載入中，請稍候幾秒再試。'); return;
                }
                
                setIsSubmitting(true);
                try {
                    const sessionKey = generateRandomKey(); 
                    const sensitiveData = { ...formData, signatureUrl, passbookUrl };
                    
                    const encryptedPayload = window.CryptoJS.AES.encrypt(JSON.stringify(sensitiveData), sessionKey).toString();
                    
                    const encryptor = new window.JSEncrypt();
                    encryptor.setPublicKey(authConfig.publicKey);
                    const encryptedSessionKey = encryptor.encrypt(sessionKey);
                    
                    if (!encryptedSessionKey) throw new Error("RSA金鑰產生失敗");
                    
                    await addDoc(collection(db, 'artifacts', MY_PROJECT_ID, 'public', 'data', 'instructors'), { 
                        name: formData.name, 
                        payload: encryptedPayload,
                        e2eeKey: encryptedSessionKey, 
                        createdAt: Date.now(),
                        userId: user.uid 
                    });
                    
                    showToast('🔒 您的資料已完成高強度自動加密並成功同步！');
                    setView('home');
                } catch (error) { 
                    console.error("Submit Error:", error);
                    showToast(`❌ 上傳失敗: ${error.message || '網路不穩'}`); 
                } finally { 
                    setIsSubmitting(false); 
                }
            };

            const handlePreviewClick = (e) => {
                e.preventDefault();
                if (!isAgreed) { showToast('請先勾選同意聲明！'); return; }
                if (!formData.name) { showToast('請填寫姓名！'); return; }
                if (!formData.idNumber) { showToast('請填寫身分證字號！'); return; }
                if (!formData.address) { showToast('請填寫戶籍地址！'); return; }
                if (!formData.phone) { showToast('請填寫聯絡電話！'); return; }
                if (formData.bankType === 'bank' && (!formData.bankName || !formData.bankAccount)) { showToast('請填寫完整銀行資訊！'); return; }
                if (formData.bankType === 'post' && (!formData.postOffice || !formData.postAccount)) { showToast('請填寫完整郵局資訊！'); return; }
                if ((formData.bankType === 'bank' || formData.bankType === 'post') && !passbookUrl) { showToast('請上傳存摺封面照片！'); return; }
                if (!signatureUrl) { showToast('請務必簽名！'); return; }
                setStep('preview');
                window.scrollTo(0, 0);
            };

            if (step === 'preview') {
                return (
                    <div className="max-w-2xl mx-auto my-10 p-4 print-hide">

                                資料確認預覽 
                                {authConfig.publicKey && <span className="bg-green-100 text-green-700 text-xs px-2 py-1 rounded">🛡️ 自動加密準備就緒</span>}
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-10 text-lg mb-8">
